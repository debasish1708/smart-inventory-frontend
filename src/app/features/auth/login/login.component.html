<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <h1>🏪 Smart Inventory</h1>
      <p>Sign in to your account</p>
    </div>
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" [class.error]="submitted && !email">
      <span *ngIf="submitted && !email" class="error-msg">Email is required</span>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap">
        <input [type]="showPass?'text':'password'" [(ngModel)]="password" placeholder="Enter password" [class.error]="submitted && !password">
        <span class="toggle-eye" (click)="showPass=!showPass">{{ showPass?'🙈':'👁' }}</span>
      </div>
      <span *ngIf="submitted && !password" class="error-msg">Password is required</span>
    </div>
    <button class="btn-primary" (click)="login()" [disabled]="loading">
      <span *ngIf="loading" class="spinner"></span>{{ loading?'Signing in…':'Sign In' }}
    </button>
    <div class="auth-link">Don't have an account? <a routerLink="/auth/register">Register</a></div>
  </div>
</div>
