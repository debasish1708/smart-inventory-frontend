<app-layout pageTitle="My Profile" [navItems]="nav" roleLabel="Supplier Portal">
  <div *ngIf="loading" class="empty-state card"><div class="empty-icon">⏳</div><p>Loading…</p></div>
  <ng-container *ngIf="!loading">
    <div class="card profile-header-card" style="display:flex; align-items:center; gap:24px; padding:28px;">
      <div class="profile-avatar" style="position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; width:80px; height:80px; min-width:80px; border-radius:50%; background:#7c3aed; color:white; font-size:28px; font-weight:700; box-shadow:0 4px 10px rgba(0,0,0,0.15);">
        <img *ngIf="profile?.profileImageUrl" [src]="getImgUrl(profile.profileImageUrl)" style="width:100%; height:100%; object-fit:cover;" />
        <span *ngIf="!profile?.profileImageUrl">{{ initials }}</span>
      </div>
      <div>
        <div class="profile-name" style="font-size:20px; font-weight:800; color:#0f172a;">{{ profile?.firstName ? profile.firstName+' '+profile.lastName : profile?.email }}</div>
        <div class="profile-email" style="font-size:13.5px; color:#64748b; margin-top:2px;">{{ profile?.email }}</div>
        <div style="margin-top:12px; display:flex; align-items:center; flex-wrap:wrap; gap:12px;">
          <label class="btn-secondary" style="font-size:12.5px; padding:6px 14px; cursor:pointer; margin:0; display:inline-block; border-radius:8px; border:1.5px solid #7c3aed; color:#7c3aed; font-weight:600;">
            📁 Change Photo
            <input type="file" (change)="onFileSelected($event)" accept="image/*" style="display:none;" />
          </label>
          <span *ngIf="uploadingImage" class="spinner" style="border: 2px solid rgba(124, 58, 237, 0.3); border-top-color:#7c3aed; width:16px; height:16px; margin:0;"></span>
          <span class="badge badge-active" *ngIf="profile?.userStatus==='ACTIVE'">Active</span>
          <span class="badge badge-pending" *ngIf="profile?.userStatus==='PENDING'">Pending Approval</span>
          <span style="font-size:13px; color:#2e7d32; font-weight:600;" *ngIf="profile?.profileCompleted">✓ Profile Complete</span>
          <span style="font-size:13px; color:#e65100; font-weight:600;" *ngIf="!profile?.profileCompleted">⚠ Incomplete</span>
        </div>
      </div>
    </div>
    
    <div class="card" style="padding:32px; border-radius:16px; border:1px solid #e2e8f0; box-shadow:0 4px 12px -2px rgba(0,0,0,0.05);">
      <div class="card-title" style="font-size:17px; font-weight:800; color:#0f172a; margin-bottom:24px;">✏️ {{ profile?.profileCompleted ? 'Update Profile' : 'Complete Your Profile' }}</div>
      <div *ngIf="error" class="alert alert-error" style="margin-bottom:20px;">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success" style="margin-bottom:20px;">{{ success }}</div>
      <div class="grid-2">
        <div class="form-group"><label>First Name *</label><input [(ngModel)]="form.firstName"></div>
        <div class="form-group"><label>Last Name *</label><input [(ngModel)]="form.lastName"></div>
        <div class="form-group"><label>Business Name *</label><input [(ngModel)]="form.businessName"></div>
        <div class="form-group"><label>Business Type</label><input [(ngModel)]="form.businessType" placeholder="Retail / Wholesale"></div>
        <div class="form-group"><label>Mobile *</label><input [(ngModel)]="form.mobNo"></div>
        <div class="form-group"><label>GST Number</label><input [(ngModel)]="form.gst"></div>
        <div class="form-group full-width"><label>Address *</label><input [(ngModel)]="form.address"></div>
        <div class="form-group"><label>City *</label><input [(ngModel)]="form.city"></div>
        <div class="form-group"><label>State *</label><input [(ngModel)]="form.state"></div>
        <div class="form-group"><label>Pincode *</label><input [(ngModel)]="form.pincode"></div>
      </div>
      <div style="margin-top:24px">
        <button class="btn-primary" style="max-width:200px; background:linear-gradient(135deg, #7c3aed, #6d28d9);" (click)="save()" [disabled]="saving">
          <span *ngIf="saving" class="spinner"></span>{{ saving?'Saving…':'Save Profile' }}
        </button>
      </div>
    </div>
  </ng-container>
</app-layout>
