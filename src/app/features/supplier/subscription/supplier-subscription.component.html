<app-layout pageTitle="Subscription" [navItems]="nav" roleLabel="Supplier Portal">
  <div class="card" *ngIf="current">
    <div class="card-title">💳 Current Plan</div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <span class="plan-badge">{{ current.planName }}</span>
      <span style="font-size:13px;color:#666">{{ current.status }}</span>
      <span *ngIf="current.endDateTime" style="font-size:13px;color:#888">Valid till: {{ current.endDateTime | date:'dd MMM yyyy' }}</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📦 Available Plans</div>
    <div class="plans-grid">
      <div class="plan-card" *ngFor="let p of plans" [class.active]="isActive(p.name)">
        <div class="plan-badge-top" *ngIf="isActive(p.name)">✓ Current</div>
        <div class="plan-name" [style.color]="p.color">{{ p.name }}</div>
        <div class="plan-price"><span *ngIf="p.price===0">Free</span><span *ngIf="p.price>0">₹{{ p.price }}<small>/mo</small></span></div>
        <ul class="plan-features"><li *ngFor="let f of p.features">{{ f }}</li></ul>
        <button class="btn-primary" [disabled]="isActive(p.name)" [style.background]="p.color">{{ isActive(p.name)?'Active':'Upgrade' }}</button>
      </div>
    </div>
  </div>
</app-layout>
