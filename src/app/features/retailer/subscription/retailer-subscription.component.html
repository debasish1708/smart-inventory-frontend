<app-layout pageTitle="Subscription" [navItems]="nav" roleLabel="Retailer Portal">
  <div *ngIf="upgradeSuccess" class="alert alert-success" style="margin-bottom: 20px; padding: 12px; border-radius: 8px; background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46;">
    🎉 Subscription upgraded to <strong>{{ selectedPlanName }}</strong> successfully!
  </div>

  <div class="card" *ngIf="current">
    <div class="card-title">💳 Current Plan</div>
    <div class="current-plan">
      <span class="plan-badge">{{ current.planName }}</span>
      <span class="plan-status">{{ current.status }}</span>
      <span *ngIf="current.endDateTime" style="font-size:13px;color:#888">Valid till: {{ current.endDateTime | date:'dd MMM yyyy' }}</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📦 Available Plans</div>
    <div class="plans-grid">
      <div class="plan-card" *ngFor="let p of plans" [class.active]="isActive(p.name)">
        <div class="plan-badge-top" *ngIf="isActive(p.name)">✓ Current Plan</div>
        <div class="plan-name" [style.color]="p.color">{{ p.name }}</div>
        <div class="plan-price">
          <span *ngIf="p.price === 0">Free</span>
          <span *ngIf="p.price > 0">₹{{ p.price }}<small>/month</small></span>
        </div>
        <ul class="plan-features">
          <li *ngFor="let f of p.features">{{ f }}</li>
        </ul>
        <button class="btn-primary" [disabled]="isActive(p.name) || (upgradeLoading && selectedPlanName === p.name)" [style.background]="p.color" (click)="upgrade(p.name)">
          <span *ngIf="upgradeLoading && selectedPlanName === p.name">Upgrading...</span>
          <span *ngIf="!(upgradeLoading && selectedPlanName === p.name)">{{ isActive(p.name) ? 'Active' : 'Upgrade' }}</span>
        </button>
      </div>
    </div>
  </div>
</app-layout>
