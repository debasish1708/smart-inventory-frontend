<header class="topbar">
  <div class="page-title">{{ pageTitle }}</div>
  <div class="user-area">
    <div class="avatar">{{ initials }}</div>
    <div class="user-info">
      <span class="user-email">{{ email }}</span>
      <span class="role-chip" [class]="'role-' + role.toLowerCase()">{{ role }}</span>
    </div>
  </div>
</header>
