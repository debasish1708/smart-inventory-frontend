<header class="topbar">
  <div class="page-title">{{ pageTitle }}</div>

  <div class="user-area">
    <!-- Clickable avatar only — dropdown shows details -->
    <div class="avatar" (click)="toggleDropdown()" title="Profile">{{ initials }}</div>

    <!-- Profile dropdown -->
    <div class="profile-dropdown" *ngIf="dropdownOpen">
      <div class="dropdown-header">
        <div class="dropdown-avatar">{{ initials }}</div>
        <div class="dropdown-meta">
          <span class="dropdown-email">{{ email }}</span>
          <span class="role-chip" [class]="'role-' + role.toLowerCase()">{{ role }}</span>
        </div>
      </div>
      <div class="dropdown-divider"></div>
      <button class="dropdown-logout" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </div>
</header>
